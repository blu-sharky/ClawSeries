<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawSeries - AI短剧自动化制片平台</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/project.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>
    <div id="app">
        <!-- 侧边栏 -->
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">CS</span>
                    <span class="logo-text">ClawSeries</span>
                </div>
            </div>
            <div class="sidebar-nav">
                <button class="nav-item active" data-view="new-project" onclick="navigateTo('new-project')">
                    <span class="nav-icon">+</span>
                    <span class="nav-label">新建项目</span>
                </button>
                <div class="nav-section-title">项目列表</div>
                <div id="project-list" class="nav-projects"></div>
                <div class="nav-section-title" style="margin-top: 12px;">系统</div>
                <button class="nav-item" data-view="settings" onclick="navigateTo('settings')">
                    <span class="nav-icon">⚙</span>
                    <span class="nav-label">设置</span>
                </button>
            </div>
            <div class="sidebar-footer">
                <div class="system-indicator" id="system-status">
                    <span class="status-dot"></span>
                    <span>系统正常</span>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content" id="main-content">
            <!-- 新建项目 - 对话视图 -->
            <div class="view" id="view-new-project">
                <div class="view-header">
                    <h1>新建制片项目</h1>
                    <p>ClawSeries — 五大 AI 智能体协作，一键自动化制片</p>
                </div>
                <div class="chat-container" id="chat-container">
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-welcome">
                            <div class="welcome-icon">CS</div>
                            <h2>欢迎使用 ClawSeries</h2>
                            <p>描述您想制作的短剧，AI 将引导您完成从剧本到成片的全流程。</p>
                            <div class="quick-starters">
                                <button class="quick-btn" onclick="sendQuickStart('我想做一部都市爱情短剧，重点是极限拉扯和身份反转')">都市爱情短剧</button>
                                <button class="quick-btn" onclick="sendQuickStart('做一个悬疑推理系列，类似隐秘的角落那种风格')">悬疑推理系列</button>
                                <button class="quick-btn" onclick="sendQuickStart('古风仙侠短剧，要有修炼升级和爱情线')">古风仙侠</button>
                                <button class="quick-btn" onclick="sendQuickStart('职场商战题材，讲一个年轻人逆袭的故事')">职场逆袭</button>
                            </div>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <div class="chat-input-wrapper">
                            <textarea id="chat-input" placeholder="描述您想制作的短剧..." rows="1" onkeydown="handleInputKeydown(event)"></textarea>
                            <button class="send-btn" id="send-btn" onclick="sendMessage()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 项目详情视图 -->
            <div class="view hidden" id="view-project-detail">
                <div class="view-header" id="project-detail-header"></div>
                <div class="project-detail-content" id="project-detail-content"></div>
            </div>

            <!-- 设置视图 -->
            <div class="view hidden" id="view-settings">
                <div class="view-header">
                    <h1>模型配置</h1>
                    <p>配置 LLM、图片生成、视频生成模型的连接信息</p>
                </div>
                <div id="settings-content" class="settings-content"></div>
            </div>
        </main>
    </div>

    <script src="js/mock-data.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/project.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
